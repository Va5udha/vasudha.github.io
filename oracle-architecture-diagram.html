<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle Architecture Visualizer — Interactive Flow Diagram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   GLOBAL RESET — prevents all overflow
   ════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
}
html, body {
  overflow-x: hidden;
  overflow-wrap: break-word;
  word-wrap: break-word;
}
/* Constrain all major containers */
.chapter-card,
.arch-box,
.nested-box,
.analogy-box,
.story-box,
.tip-box,
.checklist,
.comp-card,
.diagram-explain,
.code-block,
.big-picture,
.blog-cta {
  max-width: 100%;
}
/* Ensure grids don't overflow */
.arch-grid {
  min-width: 0;
}
.arch-grid > * {
  min-width: 0;
}
/* Force images/media to scale */
img, video, canvas, svg {
  max-width: 100%;
  height: auto;
}
/* Tables should not force width */
.chapter-card table {
  table-layout: fixed;
  width: 100%;
}

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#16003a;
  --ink2:#2d1260;
  --ink3:#7c6fa0;
  --bg:#0d0020;
  --bg2:#130030;
  --indigo:#a78bfa;
  --indigo2:#c4b5fd;
  --coral:#ff6b6b;
  --coral2:#ff8e8e;
  --mint:#2dd4bf;
  --gold:#fbbf24;
  --white:#ffffff;
  --border:rgba(255,255,255,0.12);
  --border2:rgba(255,255,255,0.06);
}
html{scroll-behavior:smooth;}
body{
  font-family:'Syne',sans-serif;
  color:#f0eeff;
  overflow-x:clip;
  background:#0d0020;
  line-height:1.7;
}

/* ── AURORA MESH BACKGROUND ── */
.aurora-bg{
  position:fixed;inset:0;z-index:-1;
  background:#0d0020;
  overflow:hidden;
}
.aurora-bg::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(139,92,246,0.55) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 5%,  rgba(236,72,153,0.40) 0%, transparent 55%),
    radial-gradient(ellipse 70% 55% at 65% 85%, rgba(6,182,212,0.45)  0%, transparent 60%),
    radial-gradient(ellipse 50% 45% at 10% 80%, rgba(16,185,129,0.35) 0%, transparent 55%),
    radial-gradient(ellipse 55% 40% at 90% 50%, rgba(251,146,60,0.30) 0%, transparent 55%),
    radial-gradient(ellipse 40% 35% at 50% 50%, rgba(167,139,250,0.20) 0%, transparent 60%);
  animation:auroraShift 14s ease-in-out infinite alternate;
}
.aurora-bg::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 65% 55% at 75% 20%, rgba(99,102,241,0.40) 0%, transparent 55%),
    radial-gradient(ellipse 50% 45% at 25% 70%, rgba(244,114,182,0.35) 0%, transparent 50%),
    radial-gradient(ellipse 45% 40% at 55% 40%, rgba(34,211,238,0.25) 0%, transparent 50%);
  animation:auroraShift2 18s ease-in-out infinite alternate;
}
@keyframes auroraShift{
  0%  {transform:translate(0,0) scale(1);}
  33% {transform:translate(3%,2%) scale(1.04);}
  66% {transform:translate(-2%,3%) scale(0.97);}
  100%{transform:translate(2%,-2%) scale(1.03);}
}
@keyframes auroraShift2{
  0%  {transform:translate(0,0) scale(1.02);}
  50% {transform:translate(-3%,-2%) scale(0.96);}
  100%{transform:translate(2%,3%) scale(1.05);}
}
.aurora-bg .grain{
  position:absolute;inset:0;opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 3rem;height:64px;
  background:rgba(8,0,20,0.82);
  backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.nav-logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;
  letter-spacing:-0.02em;color:#fff;text-decoration:none;
  display:flex;align-items:center;gap:8px;
}
.logo-pill{
  background:rgba(167,139,250,0.25);color:#e0d4ff;
  border:1px solid rgba(167,139,250,0.4);
  font-size:0.6rem;font-weight:700;letter-spacing:0.1em;
  padding:3px 8px;border-radius:20px;text-transform:uppercase;
}
.nav-links{display:flex;align-items:center;gap:0.2rem;}
.nav-links a{
  font-size:0.78rem;font-weight:600;letter-spacing:0.04em;
  color:rgba(255,255,255,0.75);text-decoration:none;padding:0.4rem 0.9rem;
  border-radius:6px;transition:all 0.15s;text-transform:uppercase;
}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,0.1);}
.nav-cta{
  background:rgba(167,139,250,0.22);color:#e0d4ff;
  border:1px solid rgba(167,139,250,0.45);
  font-size:0.78rem;font-weight:700;
  padding:0.45rem 1.1rem;border-radius:6px;text-decoration:none;
  letter-spacing:0.04em;text-transform:uppercase;transition:all 0.15s;
}
.nav-cta:hover{background:var(--indigo);color:#fff;border-color:var(--indigo);}

/* ── BLOG HERO ── */
.blog-hero{
  min-height:60vh;display:flex;flex-direction:column;justify-content:flex-end;
  padding:10rem 3rem 4rem;max-width:900px;margin:0 auto;
  position:relative;
}
.blog-back{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'JetBrains Mono',monospace;font-size:0.72rem;
  color:rgba(255,255,255,0.75);text-decoration:none;
  margin-bottom:1.5rem;letter-spacing:0.04em;text-transform:uppercase;
  transition:color 0.15s;
}
.blog-back:hover{color:#c4b5fd;}
.blog-tag-row{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.2rem;}
.blog-tag{
  font-family:'JetBrains Mono',monospace;font-size:0.68rem;font-weight:600;
  text-transform:uppercase;letter-spacing:0.1em;
  padding:0.28rem 0.7rem;border-radius:4px;border:1px solid;
}
.tag-indigo{background:rgba(124,58,237,0.3);border-color:rgba(167,139,250,0.5);color:#e0d4ff;}
.tag-coral{background:rgba(220,38,38,0.25);border-color:rgba(255,107,107,0.45);color:#fecaca;}
.tag-mint{background:rgba(5,150,105,0.25);border-color:rgba(45,212,191,0.4);color:#a7f3d0;}
.tag-gold{background:rgba(180,130,0,0.25);border-color:rgba(251,191,36,0.4);color:#fef08a;}
.blog-title{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(2rem,4.5vw,3.4rem);letter-spacing:-0.04em;
  line-height:1.1;margin-bottom:1rem;color:#fff;
  text-shadow:0 2px 20px rgba(0,0,0,0.5);
}
.blog-subtitle{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:clamp(1.1rem,2vw,1.5rem);color:rgba(255,255,255,0.85);
  margin-bottom:1.5rem;
}
.blog-meta{
  font-family:'JetBrains Mono',monospace;font-size:0.72rem;
  color:rgba(255,255,255,0.75);letter-spacing:0.04em;
  display:flex;gap:1.5rem;flex-wrap:wrap;
}
.blog-meta span{display:flex;align-items:center;gap:6px;}

/* ── CONTENT ── */
.blog-content{
  max-width:900px;margin:0 auto;padding:0 3rem 6rem;
}

/* Chapter cards */
.chapter-card{
  background:rgba(5,0,18,0.72);
  overflow:hidden;
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:16px;padding:2.2rem 2.2rem 2rem;
  margin-bottom:1.5rem;
  position:relative;overflow:hidden;
  transition:transform 0.2s,border-color 0.2s;
  backdrop-filter:blur(16px);
  box-sizing:border-box;
}
.chapter-card:hover{
  transform:translateY(-3px);
  border-color:rgba(167,139,250,0.35);
}
.chapter-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#7c3aed,#a78bfa);
}
.chapter-num{
  font-family:'JetBrains Mono',monospace;font-size:0.68rem;font-weight:600;
  text-transform:uppercase;letter-spacing:0.12em;
  color:#c4b5fd;margin-bottom:0.6rem;
}
.chapter-title{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:clamp(1.3rem,2.5vw,1.7rem);letter-spacing:-0.03em;
  color:#fff;margin-bottom:1.2rem;line-height:1.3;
}
.chapter-title .emoji{margin-right:0.4rem;}

/* Text */
.chapter-card p{
  font-size:0.95rem;color:rgba(255,255,255,0.88);
  line-height:1.85;margin-bottom:1rem;
}
.chapter-card strong{color:#fff;font-weight:700;}
.chapter-card em{font-family:'Instrument Serif',serif;font-style:italic;color:#fbbf24;}
.chapter-card code{
  font-family:'JetBrains Mono',monospace;font-size:0.82rem;
  background:rgba(255,255,255,0.1);padding:0.15rem 0.4rem;border-radius:4px;
  color:#a7f3d0;
}

/* Flow steps */
.flow-steps{
  display:flex;flex-wrap:wrap;gap:0.6rem;justify-content:center;
  margin:1.5rem 0;
}
.flow-step{
  background:linear-gradient(135deg,rgba(124,58,237,0.5),rgba(167,139,250,0.4));
  color:#fff;padding:0.7rem 1.2rem;border-radius:8px;
  font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;
  text-align:center;box-shadow:0 2px 12px rgba(124,58,237,0.3);
  position:relative;
}
.flow-step::after{
  content:"→";position:absolute;right:-18px;top:50%;
  transform:translateY(-50%);color:#c4b5fd;font-size:1.1rem;
}
.flow-step:last-child::after{content:none;}

/* Architecture boxes inside chapters */
.arch-box{
  background:rgba(8,0,20,0.85);
  border:1.5px solid rgba(167,139,250,0.35);
  border-radius:12px;padding:1.5rem;margin:1.2rem 0;
  position:relative;
  box-sizing:border-box;
  max-width:100%;
}
.arch-box-title{
  color:#c4b5fd;font-weight:700;font-size:1.05em;
  margin-bottom:1rem;display:flex;align-items:center;gap:8px;
  font-family:'Syne',sans-serif;
}
.arch-box-ram{border-color:rgba(45,212,191,0.45);}
.arch-box-ram .arch-box-title{color:#6ee7b7;}
.arch-box-disk{border-color:rgba(251,191,36,0.45);}
.arch-box-disk .arch-box-title{color:#fde68a;}
.arch-box-process{border-color:rgba(34,211,238,0.45);}
.arch-box-process .arch-box-title{color:#67e8f9;}

/* Grid layouts */
.arch-grid{
  display:grid;gap:1rem;margin:1rem 0;
}
.arch-grid-2{grid-template-columns:repeat(2,1fr);}
.arch-grid-3{grid-template-columns:repeat(3,1fr);}
.arch-grid-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:700px){
  .arch-grid-2,.arch-grid-3,.arch-grid-4{grid-template-columns:1fr;}
}

/* Component cards */
.comp-card{
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:8px;padding:1rem;text-align:center;
  transition:transform 0.2s,background 0.2s;
  box-sizing:border-box;
  max-width:100%;
  word-break:break-word;
  overflow-wrap:break-word;
}
.comp-card:hover{transform:translateY(-3px);background:rgba(255,255,255,0.1);}
.comp-card .icon{font-size:1.6em;margin-bottom:0.4rem;}
.comp-card .label{color:#fff;font-weight:600;font-size:0.9rem;}
.comp-card .desc{color:rgba(255,255,255,0.7);font-size:0.78rem;margin-top:0.3rem;}

/* Nested boxes */
.nested-box{
  background:rgba(255,255,255,0.04);
  border:1px dashed rgba(255,255,255,0.15);
  border-radius:8px;padding:1.2rem;margin:0.8rem 0;
  box-sizing:border-box;
  max-width:100%;
}
.nested-label{
  font-family:'JetBrains Mono',monospace;font-size:0.7rem;
  text-transform:uppercase;letter-spacing:0.1em;
  margin-bottom:0.8rem;font-weight:600;
}

/* Arrows */
.arrow-down{text-align:center;color:#6ee7b7;font-size:1.4em;margin:0.6rem 0;}
.connection-line{
  height:2px;
  background:linear-gradient(90deg,transparent,#6ee7b7,transparent);
  margin:1rem 0;position:relative;
}
.connection-line::before{
  content:"▼";position:absolute;left:50%;top:-8px;
  transform:translateX(-50%);color:#6ee7b7;font-size:0.75em;
}

/* Story, Analogy, Tip, Checklist boxes — PORTFOLIO DARK THEME */
.story-box,
.analogy-box,
.tip-box,
.checklist{
  border-radius:12px;padding:1.8rem 1.5rem 1.5rem;
  margin:1.5rem 0;position:relative;
  border:1.5px solid;
  box-sizing:border-box;
  max-width:100%;
}
.story-box{
  background:rgba(251,191,36,0.08);
  border-color:rgba(251,191,36,0.35);
}
.analogy-box{
  background:rgba(45,212,191,0.08);
  border-color:rgba(45,212,191,0.35);
}
.tip-box{
  background:rgba(34,211,238,0.08);
  border-color:rgba(34,211,238,0.35);
}
.checklist{
  background:rgba(167,139,250,0.08);
  border-color:rgba(167,139,250,0.35);
  padding:2rem;
}

/* Box labels */
.story-box::before,
.analogy-box::before,
.tip-box::before{
  position:absolute;top:-12px;left:12px;
  padding:4px 12px;border-radius:20px;
  font-weight:700;font-size:0.72rem;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.04em;text-transform:uppercase;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.story-box::before{
  content:"🎬 SQL Story";
  background:rgba(251,191,36,0.9);color:#1a1200;
}
.analogy-box::before{
  content:"🎭 Analogy";
  background:rgba(45,212,191,0.9);color:#022c22;
}
.tip-box::before{
  content:"💡 Key Insight";
  background:rgba(34,211,238,0.9);color:#082f49;
}

/* Box content */
.story-box p,
.analogy-box p,
.tip-box p,
.checklist p{
  color:rgba(255,255,255,0.9);font-size:0.92rem;line-height:1.8;
}
.story-box strong{color:#fde68a;}
.analogy-box strong{color:#6ee7b7;}
.tip-box strong{color:#67e8f9;}
.checklist strong{color:#c4b5fd;}

.story-box ul,.story-box ol,
.analogy-box ul,.analogy-box ol,
.tip-box ul,.tip-box ol,
.checklist ul,.checklist ol{
  margin-left:1.2rem;margin-top:0.6rem;
  color:rgba(255,255,255,0.85);font-size:0.9rem;line-height:1.8;
}
.story-box li,.analogy-box li,.tip-box li,.checklist li{margin-bottom:0.3rem;}

/* Checklist items */
.checklist h3{
  color:#c4b5fd;margin-bottom:1.2rem;font-size:1.2rem;
  font-family:'Syne',sans-serif;font-weight:700;
}
.checklist-item{
  display:flex;align-items:flex-start;gap:1rem;
  margin:0.8rem 0;padding:1rem;
  background:rgba(255,255,255,0.06);
  border-radius:10px;border:1px solid rgba(255,255,255,0.08);
  transition:background 0.2s;
  box-sizing:border-box;
  max-width:100%;
}
.checklist-item:hover{background:rgba(255,255,255,0.1);}
.checklist-item .emoji{font-size:1.3em;min-width:28px;}
.checklist-item .text{flex:1;}
.checklist-item .text strong{
  color:#fff;display:block;margin-bottom:0.3rem;font-size:0.95rem;
}
.checklist-item .text p{color:rgba(255,255,255,0.75);font-size:0.85rem;line-height:1.6;}

/* Tables */
.chapter-card table{
  width:100%;border-collapse:collapse;margin:1.2rem 0;
  background:rgba(5,0,18,0.5);border-radius:10px;overflow:hidden;
  border:1.5px solid rgba(255,255,255,0.12);
  font-size:0.88rem;
}
.chapter-card th{
  background:linear-gradient(135deg,rgba(124,58,237,0.5),rgba(167,139,250,0.4));
  color:#fff;padding:0.9rem 1rem;text-align:left;font-weight:700;
  font-family:'Syne',sans-serif;
}
.chapter-card td{
  padding:0.75rem 1rem;border-bottom:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.85);
}
.chapter-card tr:last-child td{border-bottom:none;}
.chapter-card tr:hover{background:rgba(255,255,255,0.04);}

/* Code blocks */
.code-block{
  background:#0a0018;
  color:#e0e0e0;padding:1.2rem 1.4rem;border-radius:10px;
  overflow-x:auto;font-family:'JetBrains Mono',monospace;
  margin:1rem 0;font-size:0.82rem;line-height:1.7;
  border:1.5px solid rgba(255,255,255,0.12);
  box-shadow:inset 0 0 30px rgba(0,0,0,0.5);
  box-sizing:border-box;
  max-width:100%;
}

/* Process badges */
.process-badge{
  display:inline-block;
  background:linear-gradient(135deg,rgba(34,211,238,0.4),rgba(59,130,246,0.4));
  color:#fff;padding:0.35rem 0.8rem;border-radius:20px;
  font-size:0.78rem;font-weight:700;margin:0.2rem;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
  font-family:'JetBrains Mono',monospace;
}

/* Highlight */
.highlight{
  background:linear-gradient(120deg,transparent 0%,rgba(251,191,36,0.25) 0%,rgba(251,191,36,0.25) 100%,transparent 100%);
  background-size:100% 40%;background-position:0 90%;background-repeat:no-repeat;
  padding:0 3px;font-weight:700;color:#fde68a;
}

/* Step flow */
.step-flow{
  display:flex;flex-wrap:wrap;gap:0.6rem;
  margin:1.2rem 0;justify-content:center;align-items:center;
}
.step{
  background:linear-gradient(135deg,rgba(124,58,237,0.5),rgba(167,139,250,0.4));
  color:#fff;padding:0.7rem 1.1rem;border-radius:8px;
  font-weight:700;text-align:center;min-width:90px;
  font-size:0.85rem;font-family:'Syne',sans-serif;
}
.step-arrow{font-size:1.3em;color:#c4b5fd;}

/* Big picture diagram */
.big-picture{
  background:rgba(5,0,18,0.85);
  border:1.5px solid rgba(167,139,250,0.3);
  border-radius:16px;padding:2rem;margin:1.5rem 0;
  backdrop-filter:blur(12px);
  box-sizing:border-box;
  max-width:100%;
}
.big-picture .comp-card{border-color:rgba(255,255,255,0.15);}

/* CTA at bottom */
.blog-cta{
  background:rgba(5,0,18,0.72);
  border:1.5px solid rgba(167,139,250,0.3);
  border-radius:16px;padding:2.5rem;text-align:center;
  margin-top:3rem;backdrop-filter:blur(16px);
}
.blog-cta h3{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:1.4rem;color:#fff;margin-bottom:0.8rem;
}
.blog-cta p{
  color:rgba(255,255,255,0.8);font-size:0.95rem;
  margin-bottom:1.5rem;line-height:1.7;
}
.btn-main{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(135deg,#7c3aed,#a855f7);
  color:#fff;text-decoration:none;
  font-size:0.85rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  padding:0.9rem 1.8rem;border-radius:6px;transition:all 0.2s;
  font-family:'Syne',sans-serif;
  box-shadow:0 4px 24px rgba(124,58,237,0.5);
}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,0.65);}

/* ── FOOTER ── */
footer{
  background:rgba(4,0,14,0.9);
  border-top:1px solid rgba(255,255,255,0.08);
  padding:3rem;
  display:flex;flex-direction:column;align-items:center;gap:1.2rem;
  backdrop-filter:blur(20px);
}
.footer-logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;
  letter-spacing:-0.05em;color:#fff;
}
.footer-logo span{color:#ff8e8e;}
.footer-links{display:flex;gap:0.3rem;flex-wrap:wrap;justify-content:center;}
.footer-links a{
  font-family:'JetBrains Mono',monospace;font-size:0.72rem;
  color:rgba(255,255,255,0.88);text-decoration:none;padding:0.3rem 0.7rem;

      "Like a fridge: keeps frequently used data cold and ready",

var currentScenario = 'none';
var currentComp = null;
var stepTimer = null;
var currentStep = -1;

function setScenario(name) {
  clearScenario();
  currentScenario = name;

  document.querySelectorAll('.sc-btn').forEach(function(b) {
    b.classList.remove('on');
    if (b.getAttribute('onclick') === "setScenario('" + name + "')") b.classList.add('on');
  });

  var sc = SCENARIOS[name];
  if (!sc) return;

  sc.flows.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.opacity = '0.85';
    var track = document.getElementById(id + '-track');
    if (track) { track.style.opacity = '0.85'; track.classList.add('active'); }
  });

  if (sc.info) {
    showScenarioInfo(sc);
  }

  if (sc.steps && sc.steps.length > 0) {
    currentStep = -1;
    animateNextStep(sc);
  }
}

function animateNextStep(sc) {
  currentStep++;
  if (currentStep >= sc.steps.length) {
    return;
  }
  var step = sc.steps[currentStep];
  var badge = document.getElementById(step.id);
  if (badge) badge.classList.add('active');
  var bg = document.getElementById('bg-' + step.id);
  if (bg) bg.classList.add('active');

  var stepEls = document.querySelectorAll('.sc-step');
  stepEls.forEach(function(el, i) { el.classList.toggle('active-step', i === currentStep); });

  stepTimer = setTimeout(function() { animateNextStep(sc); }, 1100);
}

function clearScenario() {
  if (stepTimer) clearTimeout(stepTimer);
  document.querySelectorAll('.flow-arrow').forEach(function(el) { el.style.opacity = '0'; });
  document.querySelectorAll('.flow-arrow-track').forEach(function(el) { el.style.opacity = '0'; el.classList.remove('active'); });
  document.querySelectorAll('.step-badge').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.badge-bg').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.sc-step').forEach(function(el) { el.classList.remove('active-step'); });
}

function showScenarioInfo(sc) {
  var info = sc.info;
  document.getElementById('info-default').style.display = 'none';
  document.getElementById('info-content').style.display = 'flex';
  document.getElementById('info-content').style.flexDirection = 'column';
  document.getElementById('info-category').textContent = info.cat;
  document.getElementById('info-category').style.color = info.color;
  document.getElementById('info-title').textContent = info.title;
  document.getElementById('info-desc').textContent = info.desc;

  var extra = '';
  if (info.steps) {
    extra += '<div class="info-section-title">Step-by-step</div>';
    extra += '<div class="scenario-steps">';
    info.steps.forEach(function(s, i) {
      extra += '<div class="sc-step" id="sstep-' + i + '">';
      extra += '<div class="sc-step-num">' + s.n + '</div>';
      extra += '<div>' + s.t + '</div>';
      extra += '</div>';
    });
    extra += '</div>';
  }
  document.getElementById('info-extra').innerHTML = extra;

  if (currentComp) {
    var prev = document.getElementById('comp-' + currentComp);
    if (prev) prev.classList.remove('selected');
    currentComp = null;
  }
}

function selectComp(key) {
  var data = INFO[key];
  if (!data) return;

  if (currentComp) {
    var prev = document.getElementById('comp-' + currentComp);
    if (prev) prev.classList.remove('selected');
  }
  currentComp = key;
  var el = document.getElementById('comp-' + key) || document.getElementById('comp-' + key + '1');
  if (el) el.classList.add('selected');

  setScenario('none');
  document.querySelectorAll('.sc-btn').forEach(function(b) { b.classList.remove('on'); });

  document.getElementById('info-default').style.display = 'none';
  document.getElementById('info-content').style.display = 'flex';
  document.getElementById('info-content').style.flexDirection = 'column';

  document.getElementById('info-category').textContent = data.cat;
  document.getElementById('info-category').style.color = data.color;
  document.getElementById('info-title').textContent = data.title;
  document.getElementById('info-desc').textContent = data.desc;

  var extra = '';
  if (data.points && data.points.length) {
    extra += '<div class="info-section-title">Key Points</div>';
    data.points.forEach(function(p) {
      extra += '<div class="info-point">';
      extra += '<div class="info-bullet" style="background:' + data.color + '"></div>';
      extra += '<div>' + p + '</div>';
      extra += '</div>';
    });
  }
  if (data.analogy) {
    extra += '<div class="analogy-box">';
    extra += '<div class="analogy-title">Analogy</div>';
    extra += '<div class="analogy-text">' + data.analogy + '</div>';
    extra += '</div>';
  }
  if (data.code) {
    extra += '<div class="info-section-title">Try This SQL</div>';
    extra += '<div class="info-code">' + data.code + '</div>';
  }
  document.getElementById('info-extra').innerHTML = extra;
}

// Stretch SVG to fill container exactly by adjusting viewBox to match container aspect ratio
// This keeps the coordinate system correct so hit-testing works perfectly everywhere
(function fitSVG() {
  var svg = document.getElementById('arch-svg');
  var pane = document.getElementById('diagram-pane');
  var BASE_W = 860, BASE_H = 515;

  function resize() {
    var W = pane.clientWidth;
    var H = pane.clientHeight;
    var scaleX = W / BASE_W;
    var scaleY = H / BASE_H;
    // Use the smaller scale to decide how to expand the viewBox
    // to fill the full container without distortion
    if (scaleX < scaleY) {
      // Container is taller relative to content — expand viewBox height
      var newH = BASE_W * H / W;
      svg.setAttribute('viewBox', '0 0 ' + BASE_W + ' ' + newH.toFixed(1));
    } else {
      // Container is wider — expand viewBox width
      var newW = BASE_H * W / H;
      svg.setAttribute('viewBox', '0 0 ' + newW.toFixed(1) + ' ' + BASE_H);
    }
  }

  resize();
  window.addEventListener('resize', resize);
})();
</script>
